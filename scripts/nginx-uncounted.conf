# Nginx site config — uncounted (admin + api)
# 배치: /etc/nginx/sites-available/uncounted → symlink to sites-enabled
# TLS는 certbot --nginx 로 주입 (server_name 수정 후 실행)

upstream uncounted_api  { server 127.0.0.1:3001 keepalive 32; }
upstream uncounted_admin { server 127.0.0.1:5000 keepalive 16; }

# HTTP → HTTPS redirect (certbot 실행 후 자동 반영)
server {
    listen 80;
    listen [::]:80;
    server_name admin.example.com;   # TODO: 실제 도메인으로 변경
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.example.com;   # TODO: 실제 도메인으로 변경

    # ssl_certificate / ssl_certificate_key — certbot이 자동 주입
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50M;         # 음성 업로드 감안
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain application/xml image/svg+xml;
    gzip_min_length 1024;

    # 보안 헤더 (자세한 CSP는 app/admin 정책에 맞게 조정)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API ────────────────────────────────────────────────────────
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://uncounted_api;
    }

    location = /health {
        access_log off;
        proxy_pass http://uncounted_api/health;
    }

    # ── Admin 정적 ──────────────────────────────────────────────────
    # Vite 산출물 중 assets/* 는 해시 포함 → immutable 캐시
    location ~* ^/assets/ {
        proxy_pass http://uncounted_admin;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_pass http://uncounted_admin;
    }
}
